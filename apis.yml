apis:
  - aid: sprague-resources:sprague-port
    name: SpraguePORT Customer Portal
    description: >-
      SpraguePORT is Sprague Energy's electronic customer portal providing one-stop access to
      account management, order history, invoice details, market pricing data, and energy
      management tools. Available to commercial and industrial customers, resellers, brokers,
      and channel partners. The portal covers both refined petroleum products and natural gas
      account management. No public REST API is documented; access requires direct partnership
      with Sprague Energy.
    humanURL: https://www.spragueenergy.com/
    tags:
      - Energy
      - Customer Portal
      - Fuel
      - Account Management
    properties:
      - type: Website
        url: https://www.spragueenergy.com/
      - type: Customer Portal
        url: https://mysprague.com

  - aid: sprague-resources:sprague-realtime-pricing
    name: Sprague Real-time Pricing
    description: >-
      Sprague Real-time is described as "the industry's best and simplest online pricing tool"
      for resellers and channel partners to access current market pricing for petroleum products.
      Provides market transparency for refined product pricing decisions. Access is restricted
      to Sprague business partners.
    humanURL: https://www.spragueenergy.com/
    tags:
      - Pricing
      - Petroleum
      - Market Data
      - Energy
    properties:
      - type: Website
        url: https://www.spragueenergy.com/

