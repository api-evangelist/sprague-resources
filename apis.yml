aid: sprague-resources
name: Sprague Resources
description: >-
  Sprague Resources (operating as Sprague Energy) is one of the largest independent suppliers
  of energy products and related services in the northeastern United States and Quebec, founded
  in 1870. The company distributes refined fuel products (heating oil, diesel, gasoline, kerosene,
  biofuels), natural gas, and electricity to commercial and industrial customers, and operates
  20+ port terminal facilities for materials handling. Sprague was acquired by Hartree Partners
  in 2024 and continues to expand through strategic acquisitions. While Sprague does not publish
  a public developer API, the company operates SpraguePORT, a digital customer portal for
  account management, pricing, and order history, and Sprague Real-time for market pricing.
